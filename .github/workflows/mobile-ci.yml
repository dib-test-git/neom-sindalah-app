name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'apps/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [guest-mobile, staff-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter ${{ matrix.app }} lint
      - name: Typecheck
        run: pnpm --filter ${{ matrix.app }} typecheck
      - name: Unit tests
        run: pnpm --filter ${{ matrix.app }} test -- --ci

  ios-build:
    runs-on: macos-14
    needs: lint-and-typecheck
    strategy:
      matrix:
        app: [guest-mobile, staff-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Pod install
        working-directory: apps/${{ matrix.app }}/ios
        run: pod install
      - name: Build (Debug, simulator)
        run: |
          pnpm --filter ${{ matrix.app }} build:ios:debug

  android-build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        app: [guest-mobile, staff-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: pnpm install --frozen-lockfile
      - name: Assemble debug APK
        working-directory: apps/${{ matrix.app }}/android
        run: ./gradlew assembleDebug --no-daemon
